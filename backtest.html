<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Trend Bot — 20-year backtest</title>
<style>
  :root{--bg:#09090b;--surface:#18181b;--bd:#2a2a2e;--tx:#ececee;--tx2:#9a9aa3;--tx3:#62626b;
    --pos:#3ecf8e;--neg:#ef6a72;--acc:#5e93cf;--amber:#c2954a;--mono:ui-monospace,'SF Mono',Menlo,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;padding:22px 16px 64px;max-width:760px;margin:0 auto;font-size:14px}
  a{color:var(--acc);text-decoration:none}
  .back{font-size:13px;color:var(--tx2);margin-bottom:18px;display:inline-block}
  h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
  .sub{color:var(--tx2);font-size:13px;margin-top:3px}
  .hero{background:linear-gradient(135deg,#0d2a20,#0a3328);border:1px solid #1c4d3a;border-radius:16px;padding:18px;margin:18px 0}
  .hero .k{font-size:10px;letter-spacing:1px;color:#3ecf8e;text-transform:uppercase;font-weight:600}
  .hero .big{font-size:16px;line-height:1.55;margin-top:8px}
  .hero b{font-family:var(--mono);color:#fff}
  .card{background:var(--surface);border:1px solid var(--bd);border-radius:16px;padding:16px;margin:14px 0}
  .card h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx2);margin-bottom:12px}
  table{width:100%;border-collapse:collapse}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3);text-align:right;padding:6px 4px;font-weight:600}
  th:first-child{text-align:left}
  td{padding:9px 4px;font-size:13px;text-align:right;border-top:1px solid var(--bd);font-family:var(--mono)}
  td:first-child{text-align:left;font-family:inherit}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.dim{color:var(--tx2)}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--tx2);margin-bottom:6px;flex-wrap:wrap}
  .legend i{display:inline-block;width:13px;height:0;border-top:2px solid;margin-right:5px;vertical-align:middle}
  svg{width:100%;height:250px;display:block}
  .xax{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--tx3);font-family:var(--mono)}
  .note{font-size:12px;color:var(--tx3);line-height:1.65;margin-top:6px}
  .cr{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-top:1px solid var(--bd);font-size:13px}
  .cr:first-of-type{border:0}
  .cr .v{font-family:var(--mono)}
  .err{color:var(--tx2);text-align:center;padding:30px}
</style>
</head>
<body>
  <a class="back" href="./">&larr; back to live dashboard</a>
  <h1>20-year backtest</h1>
  <div class="sub" id="sub">loading…</div>
  <div id="content"></div>
  <div class="note">Backtested on historical data with a 0.05% per-trade cost. Past performance does not predict future results. Paper/research only — not financial advice.</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const pct=n=>(n>=0?"+":"")+Number(n).toFixed(1)+"%";
const fmtY=v=>"$"+(v>=10?v.toFixed(0):v.toFixed(1));

async function load(){
  let d; try{ const r=await fetch("backtest.json?_="+Date.now()); d=await r.json(); }
  catch(e){ $("#content").innerHTML='<div class="err">Backtest data not available yet.</div>'; return; }
  render(d);
}

function logChart(curve){
  const W=720,H=250,PL=2,PR=2,PT=10,PB=18;
  const S=curve.map(p=>p.s),Hh=curve.map(p=>p.h),P=curve.map(p=>p.p);
  const all=[...S,...Hh,...P];
  const lo=Math.log(Math.min(...all)), hi=Math.log(Math.max(...all));
  const n=curve.length;
  const X=i=>PL+(i/(n-1))*(W-PL-PR);
  const Y=v=>PT+(1-(Math.log(v)-lo)/(hi-lo))*(H-PT-PB);
  const path=arr=>arr.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)).join(" ");
  // gridlines at $1,$2,$5,$10,$20,$50
  const ticks=[1,2,5,10,20,50].filter(v=>Math.log(v)>=lo&&Math.log(v)<=hi);
  const grid=ticks.map(v=>`<line x1="0" x2="${W}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" stroke="rgba(255,255,255,.05)"/><text x="4" y="${(Y(v)-3).toFixed(1)}" fill="#62626b" font-size="9" font-family="monospace">${fmtY(v)}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Growth of one dollar: strategy vs buy and hold, log scale">
    ${grid}
    <path d="${path(P)}" fill="none" stroke="#62626b" stroke-width="1.3" stroke-dasharray="4 3.5" vector-effect="non-scaling-stroke"/>
    <path d="${path(Hh)}" fill="none" stroke="#c2954a" stroke-width="1.3" stroke-dasharray="1.5 3" vector-effect="non-scaling-stroke"/>
    <path d="${path(S)}" fill="none" stroke="#5e93cf" stroke-width="1.8" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

function mrow(label,m,strong){
  const dd=m.maxdd;
  return `<tr><td style="${strong?'font-weight:600':''}">${label}</td>`+
    `<td>${pct(m.cagr)}</td><td class="neg">${pct(dd)}</td><td>${m.sharpe.toFixed(2)}</td><td class="dim">${pct(m.vol)}</td></tr>`;
}

function render(d){
  const s2=d.spy_since_2005;
  $("#sub").textContent=`Exact strategy · basket window ${d.span[0]} → ${d.span[1]} (${d.years} years) · ~${d.trades_per_year} trades/yr · ${d.avg_invested}% invested`;

  let html="";
  // Hero: the 2008 dodge
  html+=`<div class="hero"><div class="k">The crash insurance, quantified</div>
    <div class="big">In the 2008 crash, the same 50/200 trend filter on the S&amp;P 500 limited the drawdown to
    <b>${pct(s2.trend_maxdd_2008)}</b> — versus <b>${pct(s2.hold_maxdd_2008)}</b> for buy &amp; hold.
    That's the whole point of the trend rule: it sidesteps slow bear markets.</div></div>`;

  // Chart
  html+=`<div class="card"><h2>Growth of $1 — log scale</h2>
    <div class="legend">
      <span><i style="border-color:#5e93cf"></i>Strategy (trend-filtered)</span>
      <span><i style="border-color:#c2954a;border-top-style:dotted"></i>Basket buy &amp; hold</span>
      <span><i style="border-color:#62626b;border-top-style:dashed"></i>S&amp;P 500</span>
    </div>${logChart(d.curve)}
    <div class="xax"><span>${d.span[0].slice(0,4)}</span><span>${d.span[1].slice(0,4)}</span></div></div>`;

  // Metrics
  html+=`<div class="card"><h2>Performance — ${d.span[0].slice(0,4)}–${d.span[1].slice(0,4)}</h2>
    <table><thead><tr><th>Approach</th><th>CAGR</th><th>Max DD</th><th>Sharpe</th><th>Vol</th></tr></thead><tbody>
    ${mrow("Strategy (trend filter)",d.metrics.strategy,true)}
    ${mrow("Basket buy &amp; hold",d.metrics.basket_hold)}
    ${mrow("S&amp;P 500 buy &amp; hold",d.metrics.spy_hold)}
    </tbody></table>
    <div class="note">In this window the worst drop was the COVID crash — a <i>fast</i> crash the slow 200-day average can't dodge — so the strategy's max drawdown matches buy &amp; hold here. The filter's edge shows up in <i>slow</i> bears like 2008 (above) and 2022 (below).</div></div>`;

  // Crises
  html+=`<div class="card"><h2>Drawdown in each crisis — strategy vs buy &amp; hold</h2>`;
  d.crises.forEach(c=>{
    html+=`<div class="cr"><span>${c.name}</span><span class="v"><span class="${c.strat>c.hold?'pos':''}">${pct(c.strat)}</span> <span class="dim">vs</span> <span class="neg">${pct(c.hold)}</span></span></div>`;
  });
  html+=`<div class="cr"><span>2008 (S&amp;P proxy)</span><span class="v"><span class="pos">${pct(s2.trend_maxdd_2008)}</span> <span class="dim">vs</span> <span class="neg">${pct(s2.hold_maxdd_2008)}</span></span></div>`;
  html+=`</div>`;

  // Honest note
  html+=`<div class="note">Note: the energy &amp; defense theme ETFs only launched ~2010, so the full-basket backtest can't reach 2008 — that crisis is shown on the S&amp;P 500 alone (which the same rule trades identically). Takeaway: the trend filter is insurance you pay for in calm years and collect in deep bear markets.</div>`;

  $("#content").innerHTML=html;
}
load();
</script>
</body>
</html>
